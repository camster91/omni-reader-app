name: Build and Push Image

# Reusable build workflow for camster91/* Node.js web apps.
# Triggered on push to main and on tag. Builds a multi-stage Docker image
# and pushes it to ghcr.io. The image becomes the canonical deployable
# artifact — any host (Coolify, Hostinger, Render, Fly, local docker) can
# run it without needing source code, Node, or build tools on the host.
#
# Conventions:
#   - Image: ghcr.io/camster91/<repo>:main (or :<tag> for releases)
#   - Multi-arch: linux/amd64 + linux/arm64 (Raspberry Pi, Apple Silicon hosts)
#   - Buildx cache pushed to GHCR type=cache (saves ~3min per build)
#   - SBOM + provenance attestations enabled (for supply-chain trust)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_call:
    inputs:
      image_name:
        description: 'Override image name (default: repo name)'
        required: false
        type: string
      dockerfile:
        description: 'Path to Dockerfile (default: ./Dockerfile)'
        required: false
        type: string
        default: 'Dockerfile'
      platforms:
        description: 'Buildx platforms (default: amd64 + arm64)'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
    secrets:
      inherit: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image metadata
        id: meta
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [ -n "${{ inputs.image_name }}" ]; then REPO_NAME="${{ inputs.image_name }}"; fi
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/* ]]; then
            TAG="${REF#refs/tags/}"
          elif [[ "$REF" == refs/heads/main || "$REF" == refs/heads/master ]]; then
            TAG="main"
          else
            TAG="${REF#refs/heads/}"
          fi
          SHA_SHORT="${{ github.event.pull_request.head.sha || github.sha }}" | head -c 7
          SHA_SHORT=$(echo "${{ github.sha }}" | head -c 7)
          echo "image=ghcr.io/camster91/${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-buildx-main
            ${{ runner.os }}-buildx-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile || 'Dockerfile' }}
          platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}-${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          provenance: true
          sbom: true
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Image summary
        run: |
          echo "## Image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Pull:** \`docker pull ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** \`docker run -d -p 3000:3000 --name ${{ github.event.repository.name }} ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}" >> $GITHUB_STEP_SUMMARY
          echo "**SHA:** ${{ steps.meta.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
